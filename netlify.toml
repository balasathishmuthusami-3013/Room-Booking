# ── USE THIS FILE if your GitHub repo contains the WHOLE project ──
# (i.e. your repo has both frontend/ and backend/ folders)

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS    = "--legacy-peer-deps"
  CI           = "false"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
