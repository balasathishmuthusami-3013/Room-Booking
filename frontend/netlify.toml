# ── USE THIS FILE if your GitHub repo contains ONLY the frontend ──
# (i.e. your repo root has src/, public/, package.json directly)

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS    = "--legacy-peer-deps"
  CI           = "false"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
