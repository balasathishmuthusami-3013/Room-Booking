<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager – Payment</title>

  <!-- Razorpay checkout SDK -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Minimal styling -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h2 { font-size: 1.4rem; font-weight: 700; color: #1a202c; margin-bottom: 6px; }
    p.sub { color: #718096; font-size: 0.9rem; margin-bottom: 28px; }

    .amount-label { font-size: 0.75rem; font-weight: 600; color: #4a5568; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .amount-display { font-size: 2rem; font-weight: 800; color: #2d3748; margin-bottom: 32px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease;
    }
    .btn:hover:not(:disabled) { transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-razorpay { background: #3395FF; color: #fff; margin-bottom: 14px; }
    .btn-crypto   { background: #F7931A; color: #fff; }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
      color: #a0aec0;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
      z-index: 9999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #38a169; }
    #toast.error   { background: #e53e3e; }
    #toast.info    { background: #3182ce; }

    /* Lightning modal */
    #lightning-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #lightning-modal.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 380px;
      text-align: center;
    }
    .modal-box h3 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .modal-box p  { color: #718096; font-size: 0.85rem; margin-bottom: 20px; }
    .qr-placeholder {
      width: 180px;
      height: 180px;
      background: #f7fafc;
      border: 2px dashed #cbd5e0;
      border-radius: 10px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .ln-invoice {
      font-family: monospace;
      font-size: 0.7rem;
      word-break: break-all;
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 16px;
      color: #4a5568;
      cursor: pointer;
      text-align: left;
    }
    .btn-close-modal {
      background: #f7fafc;
      border: 1px solid #e2e8f0;
      color: #4a5568;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <h2>Complete Your Payment</h2>
  <p class="sub">Choose your preferred payment method below.</p>

  <div class="amount-label">Total Amount</div>
  <div class="amount-display" id="display-amount">₹500.00</div>

  <!-- Pay with Razorpay -->
  <button class="btn btn-razorpay" id="btn-razorpay" onclick="payWithRazorpay()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
    </svg>
    Pay with Razorpay
  </button>

  <div class="divider">or pay with crypto</div>

  <!-- Pay with Bitcoin -->
  <button class="btn btn-crypto" id="btn-crypto" onclick="payWithCrypto()">
    <!-- Bitcoin logo SVG -->
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M23.638 14.904c-1.602 6.43-8.113 10.34-14.542 8.736C2.67 22.05-1.244 15.525.362 9.105 1.962 2.67 8.475-1.243 14.9.358c6.43 1.605 10.342 8.115 8.738 14.548v-.002zm-6.35-4.613c.24-1.59-.974-2.45-2.64-3.03l.54-2.153-1.315-.33-.525 2.107c-.345-.087-.705-.167-1.064-.25l.526-2.127-1.32-.33-.54 2.165c-.285-.067-.565-.132-.84-.2l-1.815-.45-.35 1.407s.975.225.955.236c.535.136.63.486.615.766l-1.477 5.92c-.075.166-.24.406-.614.314.015.02-.96-.24-.96-.24l-.66 1.51 1.71.426.93.236-.54 2.19 1.32.327.54-2.165c.36.1.705.19 1.05.273l-.51 2.154 1.32.33.545-2.19c2.24.427 3.93.257 4.64-1.774.57-1.637-.03-2.58-1.217-3.196.854-.193 1.5-.76 1.68-1.93h.01zm-3.01 4.22c-.404 1.64-3.157.75-4.05.53l.72-2.9c.896.23 3.757.67 3.33 2.37zm.41-4.24c-.37 1.49-2.662.735-3.405.55l.654-2.64c.744.18 3.137.524 2.75 2.084v.006z"/>
    </svg>
    Pay with Bitcoin (Lightning)
  </button>
</div>

<!-- Lightning Modal -->
<div id="lightning-modal">
  <div class="modal-box">
    <h3>⚡ Lightning Invoice</h3>
    <p>Scan with a Lightning wallet or copy the invoice string.</p>
    <div class="qr-placeholder">⚡</div>
    <div class="ln-invoice" id="ln-invoice-text" onclick="copyInvoice()" title="Click to copy">
      Generating invoice…
    </div>
    <button class="btn-close-modal" onclick="closeModal()">Done</button>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── Configuration (set these from your app's auth/context) ──────────────
  const CONFIG = {
    apiBase:  "http://localhost:8000",
    // Retrieve from your auth store / localStorage after login
    authToken: localStorage.getItem("access_token") || "YOUR_JWT_TOKEN",
    // Payment details
    amount:   50000,     // paise (₹500)
    currency: "INR",
    description: "Task Manager Premium Plan",
  };

  // ── Display formatted amount ─────────────────────────────────────────────
  document.getElementById("display-amount").textContent =
    CONFIG.currency === "INR"
      ? `₹${(CONFIG.amount / 100).toFixed(2)}`
      : `$${CONFIG.amount.toFixed(2)}`;

  // ── Toast helper ──────────────────────────────────────────────────────────
  function showToast(msg, type = "info") {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ""; }, 4000);
  }

  // ── Auth headers ──────────────────────────────────────────────────────────
  function authHeaders() {
    return {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${CONFIG.authToken}`,
    };
  }

  // ── Set button loading state ───────────────────────────────────────────────
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span> Processing…`
      : btn.dataset.originalHtml;
  }

  // Save original button HTML on page load
  document.addEventListener("DOMContentLoaded", () => {
    ["btn-razorpay", "btn-crypto"].forEach(id => {
      document.getElementById(id).dataset.originalHtml =
        document.getElementById(id).innerHTML;
    });
  });

  // ════════════════════════════════════════════════════════════════════════
  //  RAZORPAY FLOW
  // ════════════════════════════════════════════════════════════════════════

  async function payWithRazorpay() {
    setLoading("btn-razorpay", true);

    try {
      // Step 1: Create order on our backend
      const orderRes = await fetch(`${CONFIG.apiBase}/payments/razorpay/create-order`, {
        method:  "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          amount:      CONFIG.amount,
          currency:    CONFIG.currency,
          description: CONFIG.description,
        }),
      });

      if (!orderRes.ok) {
        const err = await orderRes.json();
        throw new Error(err.detail || "Order creation failed");
      }

      const order = await orderRes.json();

      // Step 2: Open Razorpay checkout modal
      const options = {
        key:         order.key_id,
        amount:      order.amount,
        currency:    order.currency,
        name:        "Task Manager",
        description: CONFIG.description,
        order_id:    order.order_id,
        prefill: {
          name:  "User Name",
          email: "user@example.com",
        },
        theme: { color: "#3395FF" },

        // ── Success callback ────────────────────────────────────────────
        handler: async (response) => {
          await verifyRazorpayPayment(response, order.payment_db_id);
        },

        // ── Modal dismiss ───────────────────────────────────────────────
        modal: {
          ondismiss: () => {
            setLoading("btn-razorpay", false);
            showToast("Payment cancelled.", "error");
          },
        },
      };

      const rzp = new window.Razorpay(options);
      rzp.open();

      // Note: setLoading(false) is handled in handler / ondismiss
    } catch (err) {
      setLoading("btn-razorpay", false);
      showToast(`Error: ${err.message}`, "error");
      console.error("Razorpay init error:", err);
    }
  }

  async function verifyRazorpayPayment(response, paymentDbId) {
    try {
      const verifyRes = await fetch(`${CONFIG.apiBase}/payments/razorpay/verify`, {
        method:  "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          razorpay_order_id:   response.razorpay_order_id,
          razorpay_payment_id: response.razorpay_payment_id,
          razorpay_signature:  response.razorpay_signature,
        }),
      });

      if (!verifyRes.ok) {
        const err = await verifyRes.json();
        throw new Error(err.detail || "Verification failed");
      }

      const result = await verifyRes.json();

      if (result.success) {
        showToast("✅ Payment successful!", "success");
        // Redirect or update UI
        setTimeout(() => {
          window.location.href = `/payment-success?id=${paymentDbId}`;
        }, 1500);
      } else {
        throw new Error(result.message || "Payment not verified");
      }
    } catch (err) {
      showToast(`Verification error: ${err.message}`, "error");
      console.error("Razorpay verify error:", err);
    } finally {
      setLoading("btn-razorpay", false);
    }
  }

  // ════════════════════════════════════════════════════════════════════════
  //  STRIKE / BITCOIN FLOW
  // ════════════════════════════════════════════════════════════════════════

  async function payWithCrypto() {
    setLoading("btn-crypto", true);

    try {
      const invoiceRes = await fetch(`${CONFIG.apiBase}/payments/strike/create-invoice`, {
        method:  "POST",
        headers: authHeaders(),
        body: JSON.stringify({
          amount:      CONFIG.amount / 100,   // Strike uses fiat amounts (not paise)
          currency:    "USD",
          description: CONFIG.description,
        }),
      });

      if (!invoiceRes.ok) {
        const err = await invoiceRes.json();
        throw new Error(err.detail || "Invoice creation failed");
      }

      const invoice = await invoiceRes.json();

      // Show Lightning modal with the invoice
      openLightningModal(invoice.payment_url, invoice.invoice_id);

      // Poll for payment completion
      pollStrikePayment(invoice.payment_db_id);

    } catch (err) {
      showToast(`Error: ${err.message}`, "error");
      console.error("Strike invoice error:", err);
    } finally {
      setLoading("btn-crypto", false);
    }
  }

  function openLightningModal(paymentUrl, invoiceId) {
    const lnInvoice = paymentUrl.startsWith("lightning:")
      ? paymentUrl.replace("lightning:", "")
      : paymentUrl;

    document.getElementById("ln-invoice-text").textContent = lnInvoice;
    document.getElementById("lightning-modal").classList.add("open");

    // In a real app, render a QR code using a library like qrcode.js:
    // QRCode.toCanvas(document.getElementById("qr-canvas"), paymentUrl, { width: 180 });
  }

  function closeModal() {
    document.getElementById("lightning-modal").classList.remove("open");
  }

  function copyInvoice() {
    const text = document.getElementById("ln-invoice-text").textContent;
    navigator.clipboard.writeText(text).then(() => {
      showToast("Invoice copied to clipboard!", "info");
    });
  }

  async function pollStrikePayment(paymentDbId, attempts = 0) {
    if (attempts > 60) return; // stop after ~5 minutes

    try {
      const res = await fetch(`${CONFIG.apiBase}/payments/${paymentDbId}`, {
        headers: authHeaders(),
      });
      if (!res.ok) return;

      const payment = await res.json();

      if (payment.status === "completed") {
        closeModal();
        showToast("✅ Bitcoin payment confirmed!", "success");
        setTimeout(() => {
          window.location.href = `/payment-success?id=${paymentDbId}`;
        }, 1500);
        return;
      }

      if (payment.status === "failed") {
        closeModal();
        showToast("❌ Payment expired or failed.", "error");
        return;
      }

      // Still pending – poll again in 5 seconds
      setTimeout(() => pollStrikePayment(paymentDbId, attempts + 1), 5000);

    } catch (err) {
      console.error("Poll error:", err);
    }
  }
</script>
</body>
</html>
